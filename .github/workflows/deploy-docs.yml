name: Deploy Official Site

on:
  push:
    branches:
      - master
    paths:
      - 'package/official-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || contains(github.event.head_commit.message, '构建文档')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: 'npm'
          # cache-dependency-path: 'package/official-site/package-lock.json'

      - name: Install Dependencies
        working-directory: ./package/official-site
        run: |
          npm install -g pnpm
          pnpm install

      - name: Build VitePress Site
        working-directory: ./package/official-site
        run: pnpm run docs:build

      # ==============================================
      # 👇 核心：自动部署到 Cloudflare Pages
      # ==============================================
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: trailsnap
          directory: ./package/official-site/.vitepress/dist